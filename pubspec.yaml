name: electric_shapes
description: Flutter package with electric network icons and technical symbols for diagrams and utility apps.
version: 1.0.4
homepage: https://github.com/mikaelbotassi/electric_shapes
repository: https://github.com/mikaelbotassi/electric_shapes
issue_tracker: https://github.com/mikaelbotassi/electric_shapes/issues

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

topics:
  - flutter
  - icons
  - svg
  - diagrams
  - electrical

screenshots:
  - description: Electric symbols rendered with Flutter widgets.
    path: screenshots/catalog.jpg

flutter:
  fonts:
    - family: ElectricIcons
      fonts:
        - asset: lib/fonts/ElectricIcons.ttf