  applications.
version: 1.0.0
homepage:

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: ElectricIcons
      fonts:
        - asset: lib/fonts/ElectricIcons.ttf
